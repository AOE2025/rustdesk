name: build-desktop-librustdesk

on:
  workflow_dispatch:
  push:
    paths:
      - "**"
      - .github/workflows/build-desktop-librustdesk.yml

env:
  RUST_TOOLCHAIN: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FRB_VERSION: "1.80.1"
  FEATURES: "flutter,hwcodec"

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect RustDesk directory
        shell: bash
        run: |
          if [ -d rustdesk ] && [ -f rustdesk/Cargo.toml ]; then
            echo "RUSTDESK_DIR=rustdesk" >> "$GITHUB_ENV"
          else
            echo "RUSTDESK_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Install prerequisites
        shell: bash
        run: |
          sudo apt-get -y update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc \
            git \
            g++ \
            libpam0g-dev \
            libasound2-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libpulse-dev \
            libva-dev \
            libvdpau-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            nasm \
            pkg-config \
            wget

      - name: Setup vcpkg (binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies (manifest)
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
        run: |
          cd "$RUSTDESK_DIR"
          "$VCPKG_ROOT/vcpkg" install --x-install-root="$VCPKG_ROOT/installed"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu

      - name: Generate flutter_rust_bridge files
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version "${FRB_VERSION}" --features uuid --locked
          cd "$RUSTDESK_DIR"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Build librustdesk.so
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
        run: |
          cd "$RUSTDESK_DIR"
          cargo build --features "${FEATURES}" --lib --release
          mkdir -p "$GITHUB_WORKSPACE/artifacts/linux-x86_64"
          cp -f ./target/release/librustdesk.so "$GITHUB_WORKSPACE/artifacts/linux-x86_64/librustdesk.so"

      - name: Upload artifacts (linux)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-linux-x86_64
          path: artifacts/linux-x86_64

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect RustDesk directory
        shell: bash
        run: |
          if [ -d rustdesk ] && [ -f rustdesk/Cargo.toml ]; then
            echo "RUSTDESK_DIR=rustdesk" >> "$GITHUB_ENV"
          else
            echo "RUSTDESK_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - name: Setup vcpkg (binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies (manifest)
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          cd "$RUSTDESK_DIR"
          "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      - name: Generate flutter_rust_bridge files
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version "${FRB_VERSION}" --features uuid --locked
          cd "$RUSTDESK_DIR"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Build librustdesk.dll
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          cd "$RUSTDESK_DIR"
          cargo build --features "${FEATURES}" --lib --release
          mkdir -p "$GITHUB_WORKSPACE/artifacts/windows-x86_64"
          cp -f ./target/release/librustdesk.dll "$GITHUB_WORKSPACE/artifacts/windows-x86_64/librustdesk.dll"

      - name: Upload artifacts (windows)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-windows-x86_64
          path: artifacts/windows-x86_64
