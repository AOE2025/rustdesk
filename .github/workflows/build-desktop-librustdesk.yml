name: build-desktop-librustdesk

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/build-desktop-librustdesk.yml

env:
  RUST_TOOLCHAIN: "1.75"
  MAC_RUST_TOOLCHAIN: "1.81"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FRB_VERSION: "1.80.1"
  FLUTTER_VERSION: "3.24.5"
  FEATURES: "flutter,hwcodec"

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect RustDesk directory
        shell: bash
        run: |
          if [ -d rustdesk ] && [ -f rustdesk/Cargo.toml ]; then
            echo "RUSTDESK_DIR=rustdesk" >> "$GITHUB_ENV"
          else
            echo "RUSTDESK_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Install prerequisites
        shell: bash
        run: |
          sudo apt-get -y update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc \
            git \
            g++ \
            libpam0g-dev \
            libasound2-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libpulse-dev \
            libva-dev \
            libvdpau-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            nasm \
            pkg-config \
            wget

      - name: Setup vcpkg (binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies (manifest)
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
        run: |
          cd "$RUSTDESK_DIR"
          "$VCPKG_ROOT/vcpkg" install --x-install-root="$VCPKG_ROOT/installed"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get (rustdesk/flutter)
        shell: bash
        run: |
          cd "$RUSTDESK_DIR/flutter"
          flutter pub get

      - name: Generate flutter_rust_bridge files
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version "${FRB_VERSION}" --features uuid --locked
          cd "$RUSTDESK_DIR"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Build librustdesk.so
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
        run: |
          cd "$RUSTDESK_DIR"
          cargo build --features "${FEATURES}" --lib --release
          mkdir -p "$GITHUB_WORKSPACE/artifacts/linux-x86_64"
          cp -f ./target/release/liblibrustdesk.so "$GITHUB_WORKSPACE/artifacts/linux-x86_64/librustdesk.so"

      - name: Upload artifacts (linux)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-linux-x86_64
          path: artifacts/linux-x86_64

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect RustDesk directory
        shell: bash
        run: |
          if [ -d rustdesk ] && [ -f rustdesk/Cargo.toml ]; then
            echo "RUSTDESK_DIR=rustdesk" >> "$GITHUB_ENV"
          else
            echo "RUSTDESK_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get (rustdesk/flutter)
        shell: bash
        run: |
          cd "$RUSTDESK_DIR/flutter"
          flutter pub get

      - name: Setup vcpkg (binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies (manifest)
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          cd "$RUSTDESK_DIR"
          "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      - name: Generate flutter_rust_bridge files
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version "${FRB_VERSION}" --features uuid --locked
          cd "$RUSTDESK_DIR"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Build librustdesk.dll
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          cd "$RUSTDESK_DIR"
          cargo build --features "${FEATURES}" --lib --release
          mkdir -p "$GITHUB_WORKSPACE/artifacts/windows-x86_64"
          cp -f ./target/release/librustdesk.dll "$GITHUB_WORKSPACE/artifacts/windows-x86_64/librustdesk.dll"

      - name: Upload artifacts (windows)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-windows-x86_64
          path: artifacts/windows-x86_64

  build-macos:
    name: build-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            target: x86_64-apple-darwin
            vcpkg_triplet: x64-osx
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
            vcpkg_triplet: arm64-osx
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect RustDesk directory
        shell: bash
        run: |
          if [ -d rustdesk ] && [ -f rustdesk/Cargo.toml ]; then
            echo "RUSTDESK_DIR=rustdesk" >> "$GITHUB_ENV"
          else
            echo "RUSTDESK_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Install build runtime
        shell: bash
        run: |
          brew install llvm
          if command -v pkg-config &>/dev/null; then
            echo "pkg-config is already installed"
          else
            brew install pkg-config
          fi

      - name: Install NASM
        shell: bash
        run: |
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Setup vcpkg (binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies (manifest)
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.vcpkg_triplet }}
        run: |
          cd "$RUSTDESK_DIR"
          "$VCPKG_ROOT/vcpkg" install --triplet "${{ matrix.vcpkg_triplet }}" --x-install-root="$VCPKG_ROOT/installed"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
          components: rustfmt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get (rustdesk/flutter)
        shell: bash
        run: |
          cd "$RUSTDESK_DIR/flutter"
          flutter pub get

      - name: Generate flutter_rust_bridge files
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version "${FRB_VERSION}" --features uuid --locked
          cd "$RUSTDESK_DIR"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Build librustdesk.dylib
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.vcpkg_triplet }}
        run: |
          cd "$RUSTDESK_DIR"
          cargo build --features "${FEATURES}" --lib --release --target "${{ matrix.target }}"
          mkdir -p "$GITHUB_WORKSPACE/artifacts/macos-${{ matrix.arch }}"
          cp -f "./target/${{ matrix.target }}/release/liblibrustdesk.dylib" "$GITHUB_WORKSPACE/artifacts/macos-${{ matrix.arch }}/librustdesk.dylib"

      - name: Upload artifacts (macos)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-macos-${{ matrix.arch }}
          path: artifacts/macos-${{ matrix.arch }}

  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect RustDesk directory
        shell: bash
        run: |
          if [ -d rustdesk ] && [ -f rustdesk/Cargo.toml ]; then
            echo "RUSTDESK_DIR=rustdesk" >> "$GITHUB_ENV"
          else
            echo "RUSTDESK_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        shell: bash
        run: |
          brew install nasm yasm

      - name: Setup vcpkg (binary cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies (manifest)
        shell: bash
        run: |
          cd "$RUSTDESK_DIR"
          "$VCPKG_ROOT/vcpkg" install --triplet arm64-ios --x-install-root="$VCPKG_ROOT/installed"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-ios
          components: rustfmt

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get (rustdesk/flutter)
        shell: bash
        run: |
          cd "$RUSTDESK_DIR/flutter"
          flutter pub get

      - name: Generate flutter_rust_bridge files
        shell: bash
        run: |
          cargo install flutter_rust_bridge_codegen --version "${FRB_VERSION}" --features uuid --locked
          cd "$RUSTDESK_DIR"
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Build liblibrustdesk.a
        shell: bash
        run: |
          cd "$RUSTDESK_DIR"
          cargo build --features "${FEATURES}" --release --target aarch64-apple-ios --lib
          mkdir -p "$GITHUB_WORKSPACE/artifacts/ios-arm64"
          cp -f "./target/aarch64-apple-ios/release/liblibrustdesk.a" "$GITHUB_WORKSPACE/artifacts/ios-arm64/liblibrustdesk.a"

      - name: Upload artifacts (ios)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-ios-arm64
          path: artifacts/ios-arm64
