name: build-android-librustdesk

on:
  workflow_dispatch:
  push:
    paths:
      - "**"
      - .github/workflows/build-android-librustdesk.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git curl unzip tar pkg-config cmake ninja-build make perl nasm yasm \
            clang libclang-dev python3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Generate flutter_rust_bridge files
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
          test -f src/bridge_generated.rs
          test -f src/bridge_generated.io.rs

      - name: Setup vcpkg (for opus/aom/libvpx/libyuv)
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> $GITHUB_ENV
          echo "VCPKG_DISABLE_METRICS=1" >> $GITHUB_ENV
          cd "$HOME/vcpkg"
          ./vcpkg install --classic --triplet arm64-android libvpx libyuv opus aom oboe cpu-features
          ./vcpkg install --classic --triplet x64-android libvpx libyuv opus aom oboe cpu-features

      - name: Build librustdesk.so (arm64-v8a, x86_64)
        run: |
          mkdir -p artifacts/jniLibs
          cargo ndk \
            -t arm64-v8a \
            -t x86_64 \
            -o artifacts/jniLibs \
            build \
            --release \
            --lib \
            --features flutter \
            --target-dir target_android

      - name: Upload artifacts (jniLibs)
        uses: actions/upload-artifact@v4
        with:
          name: librustdesk-jniLibs
          path: artifacts/jniLibs
